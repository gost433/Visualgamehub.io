    <style>
        :root {
            --bg: #0a0c10;
            --card: #161b22;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --border: #30363d;
            --critical: #d73a49;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* Layout de Grade para Anúncios Laterais */

            justify-content: center;
            gap: 20px;
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .side-ad {
            flex: 0 0 160px;
            display: none; /* Esconde em telas menores que 1200px */
        }

        @media (min-width: 1200px) {
            .side-ad { display: block; }
        }

        .content-area {
            flex: 1;
            max-width: 900px;
        }

        .intel-report {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 40px;
            margin-bottom: 30px;
        }

        .multiplex-container {
            margin: 40px 0;
            padding: 20px;
            background: rgba(22, 27, 34, 0.5);
            border: 1px dashed var(--border);
            border-radius: 8px;
        }

        .badge { background: var(--critical); color: #fff; padding: 4px 8px; font-family: 'JetBrains Mono'; font-size: 0.7rem; }
        footer { text-align: center; padding: 40px; border-top: 1px solid var(--border); opacity: 0.6; }
