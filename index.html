<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Visual Studio Games</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { background: #000 !important; color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; }
        
        /* ANIMAÇÃO CHROMA */
        @keyframes chroma {
            0% { color: #39FF14; text-shadow: 0 0 10px #39FF14; }
            50% { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
            100% { color: #39FF14; text-shadow: 0 0 10px #39FF14; }
        }
        .chroma { animation: chroma 3s infinite linear; }

        /* TELAS */
        .page { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; position: absolute; top: 0; left: 0; }
        #login-page { z-index: 10; background: #000; }
        #hub-page { z-index: 1; display: none; background: #050505; flex-direction: column; padding: 20px; }

        .box { background: #0a0a0a; padding: 40px; border: 1px solid #222; border-radius: 10px; text-align: center; width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; outline: none; }
        .btn { width: 100%; padding: 15px; background: #39FF14; color: #000; border: none; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; width: 100%; max-width: 900px; margin-top: 50px; }
        .card { background: #111; border: 1px solid #222; padding: 20px; text-align: center; border-radius: 5px; }
        .btn-launch { background: transparent; border: 1px solid #39FF14; color: #39FF14; padding: 8px; width: 100%; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-page" class="page">
        <div class="box">
            <h1 class="chroma" style="font-size: 1.1rem; margin-bottom: 20px;">VISUAL STUDIO GAMES</h1>
            <input type="text" placeholder="ID">
            <input type="password" placeholder="PASS">
            <button class="btn" onclick="document.getElementById('login-page').style.display='none'; document.getElementById('hub-page').style.display='flex';">ENTER SYSTEM</button>
        </div>
    </div>

    <div id="hub-page" class="page">
        <h2 class="chroma" style="font-size: 1rem; border-bottom: 1px solid #222; width: 100%; padding-bottom: 15px; text-align: center;">VISUAL STUDIO GAMES</h2>
        <div class="grid">
            <div class="card"><h3>SNAKE</h3><button class="btn-launch" onclick="window.location.href='./snake.html'">LAUNCH</button></div>
            <div class="card"><h3>DRIFT</h3><button class="btn-launch" onclick="window.location.href='./carro.html'">LAUNCH</button></div>
            <div class="card"><h3>MEME</h3><button class="btn-launch" onclick="window.location.href='./meme.html'">LAUNCH</button></div>
            <div class="card"><h3>MEMORY</h3><button class="btn-launch" onclick="window.location.href='./memoria.html'">LAUNCH</button></div>
        </div>
    </div>

</body>
</html>
