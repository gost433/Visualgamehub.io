<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Kovaliosky | Vanguard Core</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; overflow: hidden; }

        /* SPLASH - Z-INDEX MÁXIMO */
        #splash-screen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: #000; color: #39FF14; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 99999; 
            cursor: pointer; opacity: 1; transition: opacity 0.5s;
        }

        /* HUB - ESCONDIDO INICIALMENTE */
        #hub-screen { 
            display: none; width: 100vw; height: 100vh; 
            flex-direction: column; align-items: center; justify-content: center; 
        }

        .chroma { color: #39FF14; text-shadow: 0 0 10px #39FF14; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 90%; max-width: 1000px; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 20px; border-radius: 10px; text-align: center; }
        
        .btn-nav { background: none; border: 1px solid #333; color: #888; padding: 10px; width: 100%; margin-top: 10px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.6rem; }
        .btn-nav:hover { border-color: #39FF14; color: #39FF14; }

        /* BOTÕES INFERIORES */
        .footer-menu { position: absolute; bottom: 20px; display: flex; gap: 30px; font-size: 0.6rem; color: #444; }
        .footer-menu span { cursor: pointer; transition: 0.3s; }
        .footer-menu span:hover { color: #39FF14; }
    </style>
</head>
