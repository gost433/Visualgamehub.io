<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KV'S Enterprise | Vanguards Visual</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="screen-entry" class="active">
        <div class="main-container">
            
            <div class="side-menu">
                <button class="side-btn register">REGISTER</button>
                <button class="side-btn wax">WAX DROPS</button>
                <button class="side-btn telos">TELOS DROPS</button>
            </div>

            <div class="login-box">
                <div class="brand-header">
                    <h1 class="neon-logo-main">VANGUARDS</h1>
                </div>
                <h2 class="login-title">LOGIN</h2>
                
                <div class="input-group">
                    <label>EMAIL ADDRESS</label>
                    <input type="email" placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label>PASSWORD</label>
                    <input type="password" placeholder="Enter your password">
                </div>

                <button id="btn-start" class="login-btn">LOGIN</button>
            </div>
        </div>
    </section>

    <section id="screen-hub">
        <nav class="gameverse-nav">
            <div class="nav-logo">VANGUARDS</div>
            <ul class="nav-links">
                <li>DROPS</li>
                <li>GITVERSE</li>
                <li>VOTING</li>
                <li>REWARDS</li>
                <li>GIT STORE</li>
            </ul>
            <button class="btn-play-highlight">PLAY HUB</button>
        </nav>

        <div class="hub-content">
            <div class="hero-section">
                <div class="hero-text">
                    <span class="tagline">REVOLUTIONIZING GAMING</span>
                    <h1 class="hero-title">PLAY + <br>COLLECT</h1>
                    <p class="hero-subtitle">WHERE GAMING MEETS THE FUTURE</p>
                </div>
                
                <div class="hero-mockup">
                    <div class="laptop-frame">
                        <div class="screen-content">
                            <div class="mini-grid">
                                <div class="mini-card"></div>
                                <div class="mini-card highlight"></div>
                                <div class="mini-card"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
