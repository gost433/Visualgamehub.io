<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio Games | Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* CSS Crítico para garantir a troca de telas */
        #screen-entry { display: flex; }
        #screen-hub { display: none; }
        section.active { display: flex !important; }
    </style>
</head>
<body>

    <section id="screen-entry" class="active">
        <div class="main-container">
            <div class="side-menu">
                <button class="side-btn register">REGISTER</button>
                <button class="side-btn wax">WAX DROPS</button>
                <button class="side-btn telos">TELOS DROPS</button>
            </div>

            <div class="login-box">
                <div class="brand-header">
                    <h1 class="neon-logo-main">VISUAL STUDIO GAMES</h1>
                </div>
                <h2 class="login-title">LOGIN</h2>
                
                <div class="input-group">
                    <label>EMAIL ADDRESS</label>
                    <input type="email" placeholder="Enter your email" id="user-email">
                </div>

                <div class="input-group">
                    <label>PASSWORD</label>
                    <input type="password" placeholder="Enter your password">
                </div>

                <button id="btn-start" class="login-btn">ENTER SYSTEM</button>
            </div>
        </div>
    </section>

    <section id="screen-hub">
        <nav class="gameverse-nav">
            <div class="nav-logo">KOVALIOSKY TRADER</div>
            <ul class="nav-links">
                <li>DASHBOARD</li>
                <li>PORTFOLIO</li>
                <li>DATABASE</li>
            </ul>
            <button class="btn-play-highlight" onclick="location.reload()">LOGOUT</button>
        </nav>

                <span class="tagline">VANGUARDS VISUAL | DEV MODE</span>
                <h1 class="hub-main-title">PROJECTS DRIVE</h1>
            </header>
