<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kovaliosky | Visual Designer & Dev</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            background: #000; color: #fff; font-family: 'Orbitron', sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* ANIMAÇÃO CHROMA */
        @keyframes chroma {
            0% { color: #39FF14; text-shadow: 0 0 10px #39FF14; }
            50% { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
            100% { color: #39FF14; text-shadow: 0 0 10px #39FF14; }
        }
        .chroma { animation: chroma 4s infinite linear; }

        /* ESTRUTURA DE CAMADAS */
        .layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* 1. LOGIN */
        #login-screen { background: #000; z-index: 30; justify-content: center; }
        .login-box { background: #0a0a0a; padding: 40px; border: 1px solid #222; border-radius: 12px; text-align: center; width: 320px; }

        /* 2. HUB (CORRIGIDO PARA DESIGNER) */
        #hub-screen { background: #050505; z-index: 20; padding: 30px; justify-content: flex-start; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; width: 100%; max-width: 1100px; margin-top: 20px; }
        .card { background: #111; border: 1px solid #222; padding: 20px; border-radius: 8px; text-align: center; transition: 0.3s; }
        .card:hover { border-color: #39FF14; transform: translateY(-5px); }

        /* 3. CURRÍCULO (PRO_PROFILE - AGORA DESIGNER) */
        #profile-screen { 
            background: #080808; z-index: 10; padding: 40px; justify-content: flex-start;
            font-family: 'JetBrains Mono', monospace;
            transform: translateX(100%); /* Começa escondido à direita */
        }
        .cv-container { 
            max-width: 800px; width: 100%; background: #0c0c0c; border-left: 3px solid #00d4ff; /* Cor azul para design */
            padding: 30px; margin-top: 20px; overflow-y: auto;
        }
        .skill-tag { display: inline-block; padding: 5px 10px; border: 1px solid #00d4ff; color: #00d4ff; font-size: 0.7rem; margin: 5px; border-radius: 3px; }

        /* BOTÕES & INPUTS */
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; outline: none; font-family: 'Orbitron'; font-size: 0.8rem; }
        .btn-main { width: 100%; padding: 15px; background: #fff; color: #000; border: none; font-weight: bold; cursor: pointer; font-family: 'Orbitron'; transition: 0.3s; }
        .btn-main:hover { background: #39FF14; transform: scale(1.02); }
        .btn-nav { background: none; border: 1px solid #444; color: #888; padding: 8px 15px; cursor: pointer; font-family: 'Orbitron'; font-size: 0.7rem; margin-left: 10px; }
        .btn-nav:hover { border-color: #fff; color: #fff; }

        /* CLASSES DE TRANSIÇÃO */
        .slide-up { transform: translateY(-100%) !important; }
        .slide-right { transform: translateX(100%) !important; }
        .slide-reset { transform: translateX(0) !important; }
    </style>
</head>
<body>

        <div class="login-box">
            <h1 class="chroma" style="font-size: 1.1rem; margin-bottom: 25px;">Visual Studio Games</h1>
            <input type="password" id="pass" placeholder="PASSWORD">
            <button class="btn-main" onclick="unlock()">ENTER SYSTEM</button>
        </div>
    </div>

            </div>
        </div>
