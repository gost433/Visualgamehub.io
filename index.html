        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background-color: #000; color: #fff; font-family: 'Orbitron', sans-serif;

            align-items: center; justify-content: center; z-index: 10000;

        .nav-item { color: #444; font-size: 0.7rem; cursor: pointer; letter-spacing: 2px; transition: 0.3s; }
        .nav-item:hover { color: #39FF14; text-shadow: 0 0 5px #39FF14; }

        /* MODAIS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 20000; justify-content: center; align-items: center; }
        .modal-content { background: #050505; border: 1px solid #39FF14; padding: 40px; max-width: 500px; border-radius: 10px; font-family: 'JetBrains Mono'; position: relative; }
        .modal-content h3 { color: #39FF14; margin-bottom: 20px; font-family: 'Orbitron'; font-size: 0.9rem; }
        .modal-body { font-size: 0.75rem; color: #888; line-height: 1.6; }
        .close-btn { position: absolute; top: 15px; right: 20px; color: #ff3131; cursor: pointer; font-size: 0.6rem; }
    </style>
</head>
