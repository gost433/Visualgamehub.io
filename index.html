<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kv's Enterprise | Visual Studio Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
        }

        .neon-glow {
            text-shadow: 0 0 10px #00ff00;
        }

        .border-neon {
            border: 1px solid #00ff00;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.1);
        }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen flex items-center justify-center">

    <div class="max-w-5xl w-full">
        <h1 class="text-center text-4xl font-black neon-glow mb-12 tracking-[0.2em]">VANGUARD_CORE_HUB</h1>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="border-neon p-8 rounded-3xl bg-black">
                <h2 class="text-xl font-bold text-[#00ff00] mb-6 uppercase">Security_Shield</h2>
                <div class="bg-[#00ff00]/5 border border-[#00ff00]/20 p-6 rounded-xl">
                    <p class="text-[10px] text-gray-500 uppercase mb-2">BTC/USDT LIVE</p>
                    <span id="btc-price" class="text-3xl font-bold text-[#00ff00]">CONECTANDO...</span>
                </div>
                <div class="mt-8 text-[10px] text-gray-400">LEAD ENGINEER: GUILHERME KOVALIOSKY</div>
            </div>

            <div class="border-neon p-8 rounded-3xl bg-black">
                <h2 class="text-xl font-bold mb-8 uppercase">Active_Solutions_v1</h2>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <a href="https://github.com/VisualStudioandSecurity?tab=repositories" target="_blank" class="block p-4 border border-[#00ff00]/40 text-[#00ff00] text-center text-[10px] font-bold hover:bg-[#00ff00] hover:text-black transition-all">
                        REPOS: <span id="repo-count">0</span>
                    </a>
                    <a href="https://github.com/VisualStudioandSecurity/Short-Sniper" target="_blank" class="block p-4 border border-white/20 text-center text-[10px] font-bold hover:border-[#00ff00] hover:text-[#00ff00] transition-all">
                        SHORT_SNIPER
                    </a>
                </div>

                <a href="https://github.com/VisualStudioandSecurity" target="_blank" class="block w-full text-center border border-[#00ff00] text-[#00ff00] py-4 text-[11px] font-black hover:bg-[#00ff00] hover:text-black transition-all">
                    ABRIR GITHUB_
                </a>
            </div>
        </div>
    </div>

    <script>
        // Motor do Bitcoin
        const btcDisplay = document.getElementById('btc-price');
        const btcWs = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
        btcWs.onmessage = (event) => {
            const data = JSON.parse(event.data);
            btcDisplay.innerText = '$' + parseFloat(data.c).toLocaleString();
        };

        // Motor do GitHub
        async function fetchGithub() {
            try {
                const res = await fetch('https://api.github.com/users/VisualStudioandSecurity');
                const data = await res.json();
                document.getElementById('repo-count').innerText = data.public_repos || '0';
            } catch (err) { document.getElementById('repo-count').innerText = 'OFF'; }
        }
        fetchGithub();
    </script>
</body>
</html>
